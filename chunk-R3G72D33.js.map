<button
  (click)="buttonClick.emit()"
  class="px-8 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold shadow-lg shadow-emerald-900/50 transition-all hover:-translate-y-1 cursor-pointer w-full"
  [class.pointer-events.none]="disabled()"
  [class.opacity-30]="disabled()"
>
  {{ text() }}
</button>
