<div class="w-full h-screen overflow-hidden flex flex-col">
  <app-header title="Gra Ciosy">
    <app-button text="Odkryj Świat" routerLink="/wiki" />
    <app-button text="Generator Map" routerLink="/generator" />
    <app-button text="Wyloguj" (buttonClick)="authService.logout()" />
  </app-header>

  <div class="size-full relative select-none flex overflow-hidden">
    @if (seed(); as seed) {
      <div class="size-full">
        <game-map #gameMap [seed]="seed" [sizeX]="sizeX()" [sizeY]="sizeY()" [maxZoom]="maxZoom" [minZoom]="minZoom" />
      </div>

      <app-side-panel>
        <minimap [sizeX]="sizeX()" [sizeY]="sizeY()" />
        <weather [seed]="seed" />
      </app-side-panel>
    }
  </div>
</div>
