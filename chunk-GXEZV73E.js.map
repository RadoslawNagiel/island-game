<div class="absolute size-12 rounded-full transition-all duration-1000 ease-linear z-10 overflow-hidden" [style.left.%]="moonX()" [style.top.%]="moonY()">
  <div class="absolute inset-1 bg-slate-100 rounded-full overflow-hidden size-10 shadow-[0_0_3px_1px rgba(255, 255, 255, 0.5)]">
    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_60%_60%,#94a3b8_0%,transparent_50%)]"></div>

    <div class="absolute top-[60%] left-[25%] size-3 rounded-full bg-slate-300/40 shadow-[inset_1px_1px_2px_rgba(0,0,0,0.1)] blur-[0.5px]"></div>
    <div class="absolute top-[30%] left-[55%] size-2 rounded-full bg-slate-300/30 shadow-[inset_-1px_-1px_1px_rgba(0,0,0,0.1)]"></div>
    <div class="absolute top-[20%] left-[30%] size-1.5 rounded-full bg-slate-400/20"></div>
    <div class="absolute top-[60%] left-[60%] size-1 rounded-full bg-slate-400/25"></div>
    <div class="absolute top-[45%] left-[15%] size-2.5 rounded-full bg-slate-300/30 blur-[0.2px]"></div>

    <div class="absolute top-[15%] left-[45%] w-5 h-3 rotate-[-20deg] rounded-full bg-slate-400/10 blur-md"></div>
  </div>
  <div
    class="absolute inset-0 rounded-full transition-all duration-1000 ease-linear z-20 blur-xs size-12"
    [style.background-color]="skyRGB()"
    [style.transform]="shadowTransform()"
  ></div>
</div>
