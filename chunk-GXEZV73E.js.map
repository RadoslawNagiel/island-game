<div class="size-full p-4 shadow-xl pointer-events-auto">
  <div class="flex flex-col gap-2">
    <div class="text-xs text-slate-400 font-mono mt-1 space-y-1">
      <div>
        Seed:
        <input
          #seedInput
          [required]="true"
          [min]="0"
          [max]="999999999"
          type="number"
          [(ngModel)]="newSeed"
          class="bg-slate-800 text-slate-200 p-1 rounded w-24 text-center"
        />
      </div>
      <div>
        Pozycja: {{ gameService.cameraPos().posX | number: '1.0-0' }} x
        {{ gameService.cameraPos().posY | number: '1.0-0' }}
      </div>
      <div>Zoom: {{ gameService.zoomLevel() | number: '1.0-0' }}</div>
      <div>Wysokość: {{ pointHeight() | number: '1.0-0' }} m n.p.m.</div>
    </div>
    <button
      [disabled]="!seedInput.validity.valid"
      (click)="regenerate.emit(newSeed())"
      class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg transition cursor-pointer shadow-lg active:scale-95 disabled:pointer-events-none disabled:opacity-30"
    >
      Generuj
    </button>
  </div>
</div>
