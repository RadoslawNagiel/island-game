<div class="animate-cloud-left">
  <div
    class="absolute top-12 left-[-20%] w-80 h-24 rounded-full blur-2xl transition-colors duration-1000 ease-linear"
    [ngStyle]="{ 'background-color': cloudRGB() }"
  ></div>
  <div
    class="absolute top-32 left-[10%] w-100 h-32 rounded-full blur-2xl transition-colors duration-1000 ease-linear"
    [ngStyle]="{ 'background-color': cloudRGB() }"
  ></div>
  <div
    class="absolute top-0 left-[10%] w-96 h-28 rounded-full blur-2xl transition-colors duration-1000 ease-linear"
    [ngStyle]="{ 'background-color': cloudRGB() }"
  ></div>
</div>

<div class="animate-cloud-right">
  <div
    class="absolute top-0 left-[-10%] w-96 h-40 rounded-full blur-2xl transition-colors duration-1000 ease-linear"
    [ngStyle]="{ 'background-color': cloudRGB() }"
  ></div>
  <div
    class="absolute top-32 left-[10%] w-100 h-32 rounded-full blur-2xl transition-colors duration-1000 ease-linear"
    [ngStyle]="{ 'background-color': cloudRGB() }"
  ></div>
</div>
