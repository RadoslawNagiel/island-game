<div class="absolute inset-0 z-0 pointer-events-none transition-opacity duration-1000" [style.opacity]="starsOpacity()">
  @for (star of stars(); track $index) {
    <div
      class="absolute bg-white rounded-full animate-twinkle"
      [style.left.%]="star.posX"
      [style.top.%]="star.posY"
      [style.width.px]="star.size"
      [style.height.px]="star.size"
      [style.animation-duration.s]="star.duration"
    ></div>
  }
</div>
