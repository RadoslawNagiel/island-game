<div class="overflow-hidden transition-all cursor-crosshair" [ngClass]="expanded() ? 'rounded-4xl size-96' : 'rounded-2xl size-40'">
  <div class="absolute top-3 right-3 cursor-pointer" (click)="toggleExpanded()">
    <div class="text-white" [ngClass]="expanded() ? 'svg-collapse text-2xl' : 'svg-expand text-xl'"></div>
  </div>
  <canvas #minimapCanvas class="block rounded object-contain size-full" (click)="onMinimapClick($event)"></canvas>
</div>
