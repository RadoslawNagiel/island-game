<div class="w-full h-screen overflow-hidden flex flex-col">
  <app-header title="Gra Ciosy">
    <app-button text="Generator Map" routerLink="/generator" />
    <app-button text="Wiki" routerLink="/wiki" />
    <app-button text="Wyloguj" (buttonClick)="authService.logout()" />
  </app-header>

  <div class="size-full relative overflow-hidden select-none">
    <canvas
      #mainCanvas
      class="absolute inset-0 z-0 cursor-crosshair active:cursor-grabbing"
      (mousedown)="mouseService.onMouseDown($event)"
      (mousemove)="mouseService.onMouseMove($event, mainCanvas)"
      (mouseup)="mouseService.onMouseUp()"
      (mouseleave)="mouseService.onMouseUp()"
      (wheel)="mouseService.onWheel($event, mainCanvas)"
    ></canvas>

    <weather class="absolute top-4 left-4 z-10" />
    <minimap class="absolute top-4 right-4 z-20" (positionChange)="gameService.drawViewport(mainCanvas)" />
    <info class="absolute bottom-4 left-4 z-10 rounded-2xl w-60 overflow-hidden bg-slate-900" (regenerate)="gameService.regenerateMap(mainCanvas, $event)" />
  </div>
</div>
