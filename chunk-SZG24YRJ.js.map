<header class="z-50 flex flex-col md:flex-row justify-between md:items-center border-b border-zinc-800 gap-4 pt-2 p-4 md:p-6 md:pb-4 sticky top-0 bg-zinc-950">
  <div>
    <h1 class="text-4xl font-extrabold text-emerald-500 tracking-tight">{{ title() }}</h1>
    <p class="text-zinc-500 mt-2">{{ subtitle() }}</p>
  </div>

  <div class="flex gap-4">
    <ng-content />
  </div>
</header>
