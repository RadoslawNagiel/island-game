<button
  (click)="buttonClick.emit()"
  class="px-4 md:px-8 py-2 md:py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-900/50 transition-all w-full"
  [class.pointer-events.none]="disabled()"
  [class.cursor-pointer]="!disabled()"
  [class.hover:-translate-y-1]="!disabled()"
  [class.hover:bg-emerald-500]="!disabled()"
  [class.opacity-30]="disabled()"
>
  {{ text() }}
</button>
