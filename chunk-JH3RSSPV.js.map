<div>
  <label class="block text-zinc-400 text-sm mb-1">{{ label() }}</label>
  <input
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value"
    [disabled]="disabled"
    (input)="onInput($event)"
    (blur)="onTouched()"
    class="w-full px-4 py-2 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 disabled:opacity-50"
  />

  <div class="text-rose-400 text-sm my-1 min-h-5">
    <ng-content select="[customError]"></ng-content>
    @if (ngControl?.touched && ngControl?.invalid) {
      {{ errorMessage() }}
    }
  </div>
</div>
