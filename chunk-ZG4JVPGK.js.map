<div class="w-full pointer-events-auto font-mono mt-1 space-y-2">
  <app-input class="block" [formControl]="seedFormControl" [keepErrorSpace]="false" type="number" label="Seed" />

  <div class="text-zinc-400 text-sm">
    Pozycja: {{ gameService.cameraPos().posX | number: '1.0-0' }} x
    {{ gameService.cameraPos().posY | number: '1.0-0' }}
  </div>
  <div class="text-zinc-400 text-sm">Zoom: {{ gameService.zoomLevel() | number: '1.0-0' }}</div>
  <div class="text-zinc-400 text-sm">Wysokość: {{ pointHeight() | number: '1.0-0' }} m n.p.m.</div>
  <app-button text="Generuj" [disabled]="!seedFormControl.valid || !seedFormControl.value" (buttonClick)="regenerateMap()" />
</div>
