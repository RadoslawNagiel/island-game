<div class="w-full h-screen overflow-hidden flex flex-col">
  <app-header title="Generator Map">
    <app-button text="Odkryj Świat" routerLink="/wiki" />
    <app-button text="Wejdź do Gry" routerLink="/game" />
  </app-header>

  <div class="size-full relative select-none flex overflow-hidden">
    <div class="size-full">
      <game-map
        #gameMap
        [seed]="generatorService.seed()"
        [sizeX]="generatorService.sizeX()"
        [sizeY]="generatorService.sizeY()"
        [maxZoom]="maxZoom"
        [minZoom]="minZoom"
      />
    </div>

    <app-side-panel>
      <minimap [sizeX]="generatorService.sizeX()" [sizeY]="generatorService.sizeY()" />
      <weather [seed]="generatorService.seed()" />
      <info [seed]="generatorService.seed()" (regenerate)="regenerateMap($event)" />
    </app-side-panel>
  </div>
</div>
